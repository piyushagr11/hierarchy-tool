spring.application.name=hierarchy-tool
server.port=9090

# PostgreSQL database configuration
# Use environment variables for flexibility across different environments
spring.datasource.url=jdbc:postgresql://localhost:5432/hierarchydb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=MySecretPass123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# SnapAdmin configuration
snapadmin.enabled=true
snapadmin.baseUrl=admin
snapadmin.modelsPackage=com.supplychain.hierarchytool.model
snapadmin.testMode=false

spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'